<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粘液科技助手</title>
    <meta name="description" content="粘液科技助手Slimefun Assistant：浏览器版离线配方查询、材料计算、合成规划、多物品计算工具，支持本地缓存、增量更新、手机适配，打开即用无需服务器。">
    <link rel="stylesheet" href="style.css?v=0.7.3">
</head>
<body>
    <div class="app">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <aside class="sidebar">
            <div class="logo">⚗️ 粘液助手</div>
            <nav class="menu">
                <button class="menu-item active" data-view="browser">📦 物品浏览</button>
                <button class="menu-item" data-view="calculator">🧮 多物品计算</button>
                <button class="menu-item" data-view="base-materials">🧱 基础材料管理</button>
                <button class="menu-item" data-view="recipe-manager">📁 配方文件管理</button>
                <button class="menu-item" data-view="settings">⚙️ 设置</button>
                <button class="menu-item" data-view="about">❓ 关于</button>
            </nav>
            <div class="version">v0.8.3 MVP</div>
        </aside>

        <main class="content">
            <!-- 加载遮罩：初始可见，不再有 hidden 类 -->
            <div id="loading-overlay" class="loading-overlay">
                <div class="loading-box">
                    <h3>正在初始化数据</h3>
                    <p>首次加载需下载配方文件，请稍候...</p>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill" style="width:0%"></div>
                    </div>
                    <p id="progress-text">0%</p>
                </div>
            </div>

            <div id="view-browser" class="view active-view"></div>
            <div id="view-calculator" class="view"></div>
            <div id="view-base-materials" class="view"></div>
            <div id="view-recipe-manager" class="view"></div>
            <div id="view-settings" class="view"></div>
            <div id="view-about" class="view"></div>
        </main>
    </div>

    <script type="module" src="app.js?v=0.7.3"></script>
    <script src="lib/fflate.min.js"></script>
</body>
</html>
